version: "3.9"

services:

  # Ollama — local LLM inference engine
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # KT RAG — Chainlit web UI + RAG pipeline
  kt-rag:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: kt-rag
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DOCS_DIR=/app/docs
      - VECTORSTORE_DIR=/app/vectorstore
    volumes:
      - ../docs:/app/docs          # KT documents — add new files here on the host
      - ../vectorstore:/app/vectorstore  # ChromaDB data — persists across restarts
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:   # Persists downloaded Ollama models across restarts
